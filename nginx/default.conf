# After: certbot certonly --standalone -d elkady.online -d www.elkady.online
# Paths match Let's Encrypt on the host (mounted read-only into this container).

server {
    listen 80;
    server_name elkady.online www.elkady.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name elkady.online www.elkady.online;

    ssl_certificate /etc/letsencrypt/live/elkady.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elkady.online/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }
}
