services:
  db:
    image: postgres:16-alpine
    container_name: smartwarehouse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartwarehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # High host port avoids clash with local PostgreSQL on 5432/5433
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartwarehouse"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartwarehouse-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartwarehouse?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-please-set-auth-secret-at-least-32-characters-long}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: smartwarehouse-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
